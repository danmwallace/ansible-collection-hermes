# SPDX-License-Identifier: MIT
---
galaxy_info:
  role_name: claude_code
  author: Dan Wallace
  description: >
    Install Anthropic Claude Code CLI for use as an AI coding agent.
    Installs the npm package, creates the config directory, and writes
    global settings. Does NOT authenticate — auth is a manual step
    (run `claude` as the target user and complete browser OAuth).
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: Fedora
      versions:
        - "40"
        - "41"
        - "42"

dependencies: []
