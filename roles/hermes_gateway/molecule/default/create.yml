---
- name: Create molecule instance
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Start hermes-gateway-instance container
      containers.podman.podman_container:
        name: hermes-gateway-instance
        image: docker.io/ubuntu:noble
        state: started
        command: sleep infinity
        privileged: true

- name: Bootstrap Python on molecule instance
  hosts: all
  gather_facts: false
  tasks:
    - name: Update apt cache via raw
      ansible.builtin.raw: "apt-get update -q"
      changed_when: false

    - name: Install Python 3 and sudo via raw
      ansible.builtin.raw: "apt-get install -y python3 python3-apt sudo"
      changed_when: false

- name: Ensure runtime prerequisites
  hosts: all
  gather_facts: true
  tasks:
    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Ensure ansible user exists
      ansible.builtin.user:
        name: ansible
        group: docker
        state: present
