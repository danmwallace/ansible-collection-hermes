---
- name: Restart hermes-agent service
  ansible.builtin.systemd:
    name: hermes-agent.service
    state: restarted
    daemon_reload: true
  become: true
  tags:
    - molecule-notest
  register: _hermes_native_service_restart
  failed_when:
    - _hermes_native_service_restart is failed
    - "'Could not find the requested service' not in (_hermes_native_service_restart.msg | default(''))"
