# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Install NousResearch hermes-agent natively as a systemd service.
    description:
      - Creates a dedicated hermes OS user and clones the hermes-agent source from GitHub.
      - Installs via uv into a project venv and runs hermes-agent as a systemd service.
      - Configures git identity, gh CLI auth, and HTTPS credential helper for coding-agent workflows.
      - Fedora Server only.
    author:
      - Dan Wallace
    options:
      hermes_native_user:
        type: str
        default: hermes
        description: OS user account the agent runs as.
      hermes_native_install_dir:
        type: str
        default: /home/hermes/hermes-agent
        description: Directory where the hermes-agent source is cloned and venv is created.
      hermes_native_repo_url:
        type: str
        default: https://github.com/NousResearch/hermes-agent
        description: Git URL for the hermes-agent source repo.
      hermes_native_repo_version:
        type: str
        default: main
        description: Git branch or tag to check out.
      hermes_native_workspace_dir:
        type: str
        default: /home/hermes/workspace
        description: Directory pre-created for cloning repos the agent will work on.
      hermes_native_git_user_name:
        type: str
        default: Hermes
        description: git config user.name set globally for the hermes user.
      hermes_native_git_user_email:
        type: str
        default: hermes@wallace.boston
        description: git config user.email set globally for the hermes user.
      hermes_native_api_server_port:
        type: int
        default: 8642
        description: Port for the OpenAI-compatible API server.
      hermes_native_api_server_key:
        type: str
        default: ""
        no_log: true
        description: API authentication key (minimum 8 characters). Supply from vault.
      hermes_native_dashboard_enabled:
        type: bool
        default: true
        description: Whether to enable the hermes web dashboard.
      hermes_native_dashboard_port:
        type: int
        default: 9119
        description: Port the dashboard listens on.
      hermes_native_dashboard_username:
        type: str
        default: hermes
        description: Basic auth username for the dashboard.
      hermes_native_dashboard_password:
        type: str
        default: ""
        no_log: true
        description: Basic auth password for the dashboard. Supply from vault.
      hermes_native_model_provider:
        type: str
        default: anthropic
        description: Model provider (anthropic, openai, openrouter, etc.).
      hermes_native_model:
        type: str
        default: claude-sonnet-4-6
        description: Model name passed to the provider.
      hermes_native_anthropic_api_key:
        type: str
        default: ""
        no_log: true
        description: Anthropic API key injected as ANTHROPIC_API_KEY. Supply from vault.
      hermes_native_gh_token:
        type: str
        default: ""
        no_log: true
        description: Fine-grained GitHub PAT for gh CLI auth. Supply from vault.
      hermes_native_env_file:
        type: str
        default: /etc/hermes-agent/env
        description: Path of the EnvironmentFile read by the systemd service unit.
      hermes_native_traefik_conf_dir:
        type: str
        default: /opt/podman/traefik/conf.d
        description: Directory where Traefik file provider route files are dropped.
      hermes_native_dashboard_traefik_enabled:
        type: bool
        default: false
        description: When true, write a Traefik file provider route for the dashboard.
      hermes_native_dashboard_traefik_hostname:
        type: str
        default: ""
        description: FQDN Traefik should route to the dashboard (e.g. hermes-dash-ai-master.wallace.boston).
      hermes_native_discord_bot_token:
        type: str
        default: ""
        no_log: true
        description: Discord bot token. When set, adds a Discord gateway section to config.yaml. Supply from vault.
      hermes_native_discord_allowed_users:
        type: list
        default: []
        description: List of Discord user IDs permitted to send messages to the agent.
      hermes_native_discord_admin_users:
        type: list
        default: []
        description: List of Discord user IDs with admin privileges over the agent.
      hermes_native_discord_require_mention:
        type: bool
        default: true
        description: When true, the Discord bot only responds when directly @mentioned. Reduces attack surface for single-user deployments.
      hermes_native_nopasswd_sudo:
        type: bool
        default: false
        description: When true, writes /etc/sudoers.d/hermes granting the hermes user passwordless sudo. Validated with visudo before applying.
      hermes_native_sudo_commands:
        type: list
        default: []
        description: >
          List of absolute command paths allowed via passwordless sudo. When non-empty and
          hermes_native_nopasswd_sudo is true, the sudoers entry restricts sudo to only these
          commands instead of ALL. Example: ["/usr/bin/systemctl", "/usr/bin/podman"].
          Requires hermes_native_nopasswd_sudo: true to have any effect.
