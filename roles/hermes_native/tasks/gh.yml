---
- name: Add GitHub CLI dnf repository
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/rpm/gh-cli.repo
    dest: /etc/yum.repos.d/gh-cli.repo
    mode: "0644"
  become: true

- name: Install gh CLI
  ansible.builtin.dnf:
    name: gh
    state: present
  become: true
