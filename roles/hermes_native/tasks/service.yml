---
- name: Ensure /etc/hermes-agent directory exists
  ansible.builtin.file:
    path: /etc/hermes-agent
    state: directory
    owner: root
    group: "{{ hermes_native_user }}"
    mode: "0750"
  become: true

- name: Render hermes-agent env file
  ansible.builtin.template:
    src: hermes-agent.env.j2
    dest: "{{ hermes_native_env_file }}"
    owner: root
    group: "{{ hermes_native_user }}"
    mode: "0640"
  become: true
  no_log: true
  notify: Restart hermes-agent service

- name: Render hermes-agent systemd unit
  ansible.builtin.template:
    src: hermes-agent.service.j2
    dest: /etc/systemd/system/hermes-agent.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart hermes-agent service

- name: Enable and start hermes-agent.service
  ansible.builtin.systemd:
    name: hermes-agent.service
    enabled: true
    state: started
    daemon_reload: true
  become: true
  tags:
    - molecule-notest
