---
- name: Ensure hermes group exists
  ansible.builtin.group:
    name: "{{ hermes_native_user }}"
    state: present
  become: true

- name: Ensure hermes user exists
  ansible.builtin.user:
    name: "{{ hermes_native_user }}"
    group: "{{ hermes_native_user }}"
    home: "/home/{{ hermes_native_user }}"
    shell: /bin/bash
    create_home: true
    system: false
    state: present
  become: true

- name: Ensure .ssh directory exists for hermes user
  ansible.builtin.file:
    path: "/home/{{ hermes_native_user }}/.ssh"
    state: directory
    owner: "{{ hermes_native_user }}"
    group: "{{ hermes_native_user }}"
    mode: "0700"
  become: true

- name: Ensure workspace directory exists
  ansible.builtin.file:
    path: "{{ hermes_native_workspace_dir }}"
    state: directory
    owner: "{{ hermes_native_user }}"
    group: "{{ hermes_native_user }}"
    mode: "0755"
  become: true

- name: Ensure .local/bin directory exists for hermes user
  ansible.builtin.file:
    path: "/home/{{ hermes_native_user }}/.local/bin"
    state: directory
    owner: "{{ hermes_native_user }}"
    group: "{{ hermes_native_user }}"
    mode: "0755"
  become: true

- name: Grant hermes user passwordless sudo (all commands)
  ansible.builtin.copy:
    content: "{{ hermes_native_user }} ALL=(ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ hermes_native_user }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  become: true
  when: hermes_native_nopasswd_sudo | bool and (hermes_native_sudo_commands | length == 0)

- name: Grant hermes user passwordless sudo (restricted command list)
  ansible.builtin.copy:
    content: "{{ hermes_native_user }} ALL=(ALL) NOPASSWD: {{ hermes_native_sudo_commands | join(', ') }}\n"
    dest: "/etc/sudoers.d/{{ hermes_native_user }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  become: true
  when: hermes_native_nopasswd_sudo | bool and (hermes_native_sudo_commands | length > 0)

- name: Remove hermes user passwordless sudo when disabled
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ hermes_native_user }}"
    state: absent
  become: true
  when: not hermes_native_nopasswd_sudo | bool
